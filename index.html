<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListaGo</title>
    
    <!-- Favicons -->
    <link rel="icon" href="assets/favicon/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/favicon/site.webmanifest">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="assets/icon/icon.jpeg" alt="icon">
                    <h2>ListaGo</h2>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search tasks...">
            </div>

            <!-- Main Navigation -->
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="today">
                    <i class="fas fa-calendar-day"></i>
                    <span>Today</span>
                </button>
                <button class="nav-item" data-view="upcoming">
                    <i class="fas fa-calendar-week"></i>
                    <span>Upcoming</span>
                </button>
                <button class="nav-item" data-view="all">
                    <i class="fas fa-list"></i>
                    <span>All Tasks</span>
                </button>
            </nav>

            <!-- Projects Section -->
            <div class="projects-section">
                <div class="section-header">
                    <span>Projects</span>
                    <button id="newProjectBtn" class="add-project-btn">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="projectsList" class="projects-list">
                    <!-- Projects will be added here by JavaScript -->
                </div>
            </div>

            <!-- Footer Stats -->
            <div class="sidebar-footer">
                <div id="sidebarStats" class="stats-small">
                    <span>0 tasks</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content">
            <header class="main-header glass">
                <h1 id="viewTitle">Dashboard</h1>
                <div class="header-actions">
                    <button id="addTaskBtn" class="add-task-btn">
                        <i class="fas fa-plus"></i> New Task
                    </button>
                </div>
            </header>

            <!-- Task Input -->
            <div class="input-area glass">
                <input type="text" id="taskInput" placeholder="What needs to be done today?">
                <input type="date" id="taskDate" class="date-input">
                <button id="addTaskButton" class="input-task-btn">Add</button>
            </div>

            <!-- Task List -->
            <div id="taskList" class="task-list"></div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-clipboard-list fa-3x"></i>
                <p>No tasks yet</p>
            </div>
        </main>
    </div>

       <!-- Edit Task Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon">✏️</div>
                <h3>Edit Task</h3>
                <button class="modal-close" id="closeEditModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Update your task below:</p>
                <input type="text" id="editTaskInput" class="edit-task-input" placeholder="Task description...">
                <input type="date" id="editTaskDate" class="edit-date-input">
                <div class="edit-preview" id="editPreview"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" id="cancelEditBtn">Cancel</button>
                <button class="modal-btn confirm-btn" id="confirmEditBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon">🗑️</div>
                <h3>Delete Task</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this task?</p>
                <div class="task-preview" id="taskToDeletePreview"></div>
                <p class="modal-warning">⚠️ This action cannot be undone!</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" id="cancelDeleteBtn">Cancel</button>
                <button class="modal-btn confirm-btn" id="confirmDeleteBtn">Yes, Delete</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
