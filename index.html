<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\style.css">
    <link rel="stylesheet" href="">
    <title>ToDo List</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stay focused, get it done</h1>
            <p>Powerful. Simple. Beautifully organized.</p>
        </div>
        
        <div class="input-container">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="What needs to be done?..." autocomplete="off">
                <button id="addTaskButton">+ Add Task</button>
            </div>
        </div>

        <div class="task-list-container">
            <div class="task-stats">
                <span id="taskCount">0 tasks</span>
                <span id="completedCount">0 completed</span>
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            
            <ul id="taskList"></ul>
            
            <div class="keyboard-help">
                <small>💡 <strong>Pro tips:</strong> Double-click to edit • Ctrl+E edit last • Ctrl+A focus input</small>
            </div>
        </div>
    </div>

     <script src="js\script.js"></script>
</body>
</html>
